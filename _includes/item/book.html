{% comment %}

    Add a thumbnail image or icon for book.

{%- endcomment -%}
{% if page.findingaid %}<a href="{{ page.findingaid | relative_url }}" target="_blank" rel="noopener">
    {% if page.image_thumb or page.image_small %}
        <img class="img-thumbnail" src="{{ page.image_small | default: page.image_thumb | relative_url }}" alt="{{ page.image_alt_text | default: page.description | default: page.title | escape }}"><br>
        <div class="btn-group my-2" role="group" aria-label="Item options">
            <button class="btn btn-outline-primary">View Catalog Record</button>
        </div>
    {% else %}
        <svg class="bi text-body" fill="currentColor" aria-hidden="true">
            {%- assign icon_template = page.display_template | default: page.format -%}
            <use xlink:href="{{ '/assets/lib/cb-icons.svg' | relative_url }}#{% if icon_template contains 'book' %}icon-book{% elsif icon_template contains 'pdf' %}icon-pdf{% elsif icon_template contains 'audio' %}icon-audio{% elsif icon_template contains 'image' %}icon-image{% elsif icon_template contains 'record' %}icon-record{% else %}icon-default{% endif %}"/>
        </svg>
        <span class="visually-hidden">{{ page.title | escape }} - {{ page.format }}</span><br>
        <div class="btn-group my-2" role="group" aria-label="Item options">
            <button class="btn btn-outline-primary">View Catalog Record</button>
        </div>
    {% endif %}
</a>{% endif %}
